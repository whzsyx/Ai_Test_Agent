<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise AI QA Agent 系统架构图</title>
  <desc id="desc">按用户层、接入层、业务层、服务层、存储层、基础设施层展示 Enterprise AI QA Agent 的系统架构。</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 10 6 L 2 10 z" fill="#334155"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 42px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 18px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #475569; }
      .layer-label { fill: #ffffff; stroke: #111827; stroke-width: 2.4; rx: 10; filter: url(#softShadow); }
      .layer-text { font: 700 22px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .band { fill: #ffffff; stroke: #111827; stroke-width: 2.4; rx: 10; filter: url(#softShadow); }
      .band-soft { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .module { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .module-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .module-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .module-orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .module-purple { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 8; }
      .module-rose { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 8; }
      .module-cyan { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
      .heading { font: 700 19px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .text { font: 16px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .small { font: 14px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .tiny { font: 12px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .caption { font: 13px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #475569; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); stroke-dasharray: 7 7; }
      .db { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .db-label { font: 700 16px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .db-small { font: 13px "Microsoft YaHei", "SimHei", Arial, sans-serif; fill: #475569; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1800" height="1280" class="bg"/>
  <rect width="1800" height="1280" fill="url(#grid)" opacity="0.85"/>

  <text x="90" y="64" class="title">Enterprise AI QA Agent 系统架构图</text>
  <text x="92" y="96" class="subtitle">Vue 工作台 + FastAPI/LangGraph 后端 + Agent/Tool/Skill/MCP 注册中心 + 多测试模式 + PostgreSQL/Memgraph/MySQL/MinIO 存储</text>

  <!-- Layer labels -->
  <rect x="70" y="135" width="170" height="86" class="layer-label"/>
  <text x="155" y="178" class="layer-text">用户层</text>

  <rect x="70" y="252" width="170" height="86" class="layer-label"/>
  <text x="155" y="295" class="layer-text">接入层</text>

  <rect x="70" y="369" width="170" height="96" class="layer-label"/>
  <text x="155" y="417" class="layer-text">业务层</text>

  <rect x="70" y="502" width="170" height="360" class="layer-label"/>
  <text x="155" y="682" class="layer-text">服务层</text>

  <rect x="70" y="900" width="170" height="145" class="layer-label"/>
  <text x="155" y="972" class="layer-text">存储层</text>

  <rect x="70" y="1088" width="170" height="116" class="layer-label"/>
  <text x="155" y="1146" class="layer-text">基础设施层</text>

  <!-- User layer -->
  <rect x="300" y="135" width="1520" height="86" class="band"/>
  <rect x="330" y="152" width="340" height="52" class="module"/>
  <text x="500" y="173" class="heading">平台使用者</text>
  <text x="500" y="195" class="small">QA 工程师 / 开发者 / 运维 / 安全测试人员</text>
  <rect x="760" y="152" width="650" height="52" class="module-blue"/>
  <text x="1085" y="173" class="heading">PC 端网页工作台 agent_web</text>
  <text x="1085" y="195" class="small">Vue 3 / Vite / Pinia / Vue Router / Naive UI / 多语言</text>
  <rect x="1480" y="152" width="270" height="52" class="module"/>
  <text x="1615" y="173" class="heading">桌面通知与运行监控</text>
  <text x="1615" y="195" class="small">状态、审批、完成提醒</text>

  <!-- Access layer -->
  <rect x="300" y="252" width="1520" height="86" class="band"/>
  <rect x="335" y="269" width="430" height="52" class="module"/>
  <text x="550" y="290" class="heading">静态资源 / 开发代理</text>
  <text x="550" y="312" class="small">Vite dev server / 文档站 / public 资源</text>
  <rect x="835" y="269" width="430" height="52" class="module-green"/>
  <text x="1050" y="290" class="heading">FastAPI 接口层 /api/v1</text>
  <text x="1050" y="312" class="small">REST API / CORS / SSE EventSource</text>
  <rect x="1335" y="269" width="430" height="52" class="module"/>
  <text x="1550" y="290" class="heading">鉴权与外部回调</text>
  <text x="1550" y="312" class="small">OAuth provider / integrations / MCP server 管理</text>

  <!-- Business layer -->
  <rect x="300" y="369" width="1520" height="96" class="band"/>
  <rect x="330" y="389" width="210" height="56" class="module-blue"/>
  <text x="435" y="412" class="heading">会话工作台</text>
  <text x="435" y="434" class="small">聊天 / SSE / 审批</text>
  <rect x="575" y="389" width="210" height="56" class="module-blue"/>
  <text x="680" y="412" class="heading">任务池</text>
  <text x="680" y="434" class="small">worker / 调度状态</text>
  <rect x="820" y="389" width="210" height="56" class="module-blue"/>
  <text x="925" y="412" class="heading">知识库</text>
  <text x="925" y="434" class="small">项目图谱 / 历史证据</text>
  <rect x="1065" y="389" width="210" height="56" class="module-blue"/>
  <text x="1170" y="412" class="heading">工具与插件</text>
  <text x="1170" y="434" class="small">Tool / Skill / MCP</text>
  <rect x="1310" y="389" width="210" height="56" class="module-blue"/>
  <text x="1415" y="412" class="heading">报告中心</text>
  <text x="1415" y="434" class="small">测试报告 / 邮件</text>
  <rect x="1555" y="389" width="210" height="56" class="module-blue"/>
  <text x="1660" y="412" class="heading">系统设置</text>
  <text x="1660" y="434" class="small">模型 / 邮箱 / 数据</text>

  <!-- Service layer outer -->
  <rect x="300" y="502" width="1520" height="360" class="band"/>
  <text x="1060" y="528" class="heading">Agent_Server 后端服务运行时</text>

  <!-- Core services -->
  <rect x="330" y="552" width="345" height="280" class="band-soft"/>
  <text x="502" y="579" class="heading">Application 核心服务</text>
  <rect x="355" y="602" width="145" height="54" class="module-green"/>
  <text x="427" y="624" class="text">SessionService</text>
  <text x="427" y="644" class="tiny">会话/事件/快照</text>
  <rect x="525" y="602" width="145" height="54" class="module-green"/>
  <text x="597" y="624" class="text">InputOrchestrator</text>
  <text x="597" y="644" class="tiny">输入与模式路由</text>
  <rect x="355" y="682" width="145" height="54" class="module-green"/>
  <text x="427" y="704" class="text">RuntimeService</text>
  <text x="427" y="724" class="tiny">turn 执行/恢复</text>
  <rect x="525" y="682" width="145" height="54" class="module-green"/>
  <text x="597" y="704" class="text">PermissionService</text>
  <text x="597" y="724" class="tiny">安全/审批策略</text>
  <rect x="355" y="762" width="145" height="54" class="module-green"/>
  <text x="427" y="784" class="text">PromptAssembly</text>
  <text x="427" y="804" class="tiny">结构化提示词</text>
  <rect x="525" y="762" width="145" height="54" class="module-green"/>
  <text x="597" y="784" class="text">ToolJobService</text>
  <text x="597" y="804" class="tiny">工具任务追踪</text>

  <!-- LangGraph -->
  <rect x="720" y="552" width="390" height="280" class="band-soft"/>
  <text x="915" y="579" class="heading">LangGraph 执行图</text>
  <rect x="750" y="604" width="140" height="48" class="module-orange"/>
  <text x="820" y="632" class="text">context_builder</text>
  <rect x="915" y="604" width="140" height="48" class="module-orange"/>
  <text x="985" y="632" class="text">router</text>
  <rect x="750" y="668" width="140" height="48" class="module-orange"/>
  <text x="820" y="696" class="text">planner</text>
  <rect x="915" y="668" width="140" height="48" class="module-orange"/>
  <text x="985" y="696" class="text">permission_gate</text>
  <rect x="750" y="732" width="140" height="48" class="module-orange"/>
  <text x="820" y="760" class="text">prompt_assembler</text>
  <rect x="915" y="732" width="140" height="48" class="module-orange"/>
  <text x="985" y="760" class="text">model_invoker</text>
  <rect x="750" y="796" width="140" height="36" class="module-orange"/>
  <text x="820" y="819" class="text">tool_executor</text>
  <rect x="915" y="796" width="140" height="36" class="module-orange"/>
  <text x="985" y="819" class="text">finalizer/responder</text>

  <!-- Registry and modes -->
  <rect x="1155" y="552" width="370" height="280" class="band-soft"/>
  <text x="1340" y="579" class="heading">注册中心与测试模式</text>
  <rect x="1180" y="602" width="150" height="54" class="module-purple"/>
  <text x="1255" y="624" class="text">Registries</text>
  <text x="1255" y="644" class="tiny">Agent / Tool / Model</text>
  <rect x="1350" y="602" width="150" height="54" class="module-purple"/>
  <text x="1425" y="624" class="text">Skill / MCP</text>
  <text x="1425" y="644" class="tiny">动态能力注册</text>
  <rect x="1180" y="682" width="150" height="54" class="module-purple"/>
  <text x="1255" y="704" class="text">ModeRegistry</text>
  <text x="1255" y="724" class="tiny">模式清单</text>
  <rect x="1350" y="682" width="150" height="54" class="module-purple"/>
  <text x="1425" y="704" class="text">Coordinator</text>
  <text x="1425" y="724" class="tiny">Worker 调度</text>
  <rect x="1180" y="762" width="320" height="54" class="module-purple"/>
  <text x="1340" y="784" class="text">default / UI / API / Security / Code Review</text>
  <text x="1340" y="804" class="tiny">Performance 与 Smoke 当前为能力骨架</text>

  <!-- Runtime adapters -->
  <rect x="1560" y="552" width="250" height="280" class="band-soft"/>
  <text x="1685" y="579" class="heading">运行适配与外部执行</text>
  <rect x="1580" y="602" width="190" height="44" class="module-rose"/>
  <text x="1675" y="629" class="text">Model Runtime</text>
  <rect x="1580" y="658" width="190" height="44" class="module-rose"/>
  <text x="1675" y="685" class="text">Tool Runtime</text>
  <rect x="1580" y="714" width="190" height="44" class="module-rose"/>
  <text x="1675" y="741" class="text">Playwright CLI</text>
  <rect x="1580" y="770" width="190" height="44" class="module-rose"/>
  <text x="1675" y="797" class="text">Security Runner / MCP</text>

  <!-- Storage layer -->
  <rect x="300" y="900" width="1520" height="145" class="band"/>
  <g transform="translate(390 925)">
    <ellipse cx="90" cy="18" rx="82" ry="18" class="db"/>
    <path d="M8 18 v62 c0 10 37 18 82 18 s82-8 82-18 V18" class="db"/>
    <ellipse cx="90" cy="80" rx="82" ry="18" class="db"/>
    <text x="90" y="42" class="db-label">PostgreSQL</text>
    <text x="90" y="65" class="db-small">会话/事件/快照/审批</text>
  </g>
  <g transform="translate(655 925)">
    <ellipse cx="90" cy="18" rx="82" ry="18" class="db"/>
    <path d="M8 18 v62 c0 10 37 18 82 18 s82-8 82-18 V18" class="db"/>
    <ellipse cx="90" cy="80" rx="82" ry="18" class="db"/>
    <text x="90" y="42" class="db-label">Vector Memory</text>
    <text x="90" y="65" class="db-small">记忆 / observations</text>
  </g>
  <g transform="translate(920 925)">
    <ellipse cx="90" cy="18" rx="82" ry="18" class="db"/>
    <path d="M8 18 v62 c0 10 37 18 82 18 s82-8 82-18 V18" class="db"/>
    <ellipse cx="90" cy="80" rx="82" ry="18" class="db"/>
    <text x="90" y="42" class="db-label">Memgraph</text>
    <text x="90" y="65" class="db-small">UI 页面知识图谱</text>
  </g>
  <g transform="translate(1185 925)">
    <ellipse cx="90" cy="18" rx="82" ry="18" class="db"/>
    <path d="M8 18 v62 c0 10 37 18 82 18 s82-8 82-18 V18" class="db"/>
    <ellipse cx="90" cy="80" rx="82" ry="18" class="db"/>
    <text x="90" y="42" class="db-label">MySQL</text>
    <text x="90" y="65" class="db-small">模型 / 邮件配置</text>
  </g>
  <g transform="translate(1450 925)">
    <ellipse cx="90" cy="18" rx="82" ry="18" class="db"/>
    <path d="M8 18 v62 c0 10 37 18 82 18 s82-8 82-18 V18" class="db"/>
    <ellipse cx="90" cy="80" rx="82" ry="18" class="db"/>
    <text x="90" y="42" class="db-label">MinIO</text>
    <text x="90" y="65" class="db-small">附件 / 工件 / 报告</text>
  </g>

  <!-- Infrastructure layer -->
  <rect x="300" y="1088" width="1520" height="116" class="band"/>
  <rect x="350" y="1118" width="235" height="56" class="module-cyan"/>
  <text x="467" y="1142" class="heading">本地 / Docker 运行环境</text>
  <text x="467" y="1164" class="small">Kali 安全沙箱 / 命令画像</text>
  <rect x="655" y="1118" width="235" height="56" class="module-cyan"/>
  <text x="772" y="1142" class="heading">浏览器自动化环境</text>
  <text x="772" y="1164" class="small">Python Playwright CLI</text>
  <rect x="960" y="1118" width="235" height="56" class="module-cyan"/>
  <text x="1077" y="1142" class="heading">模型 Provider</text>
  <text x="1077" y="1164" class="small">OpenAI / Anthropic / Gemini</text>
  <rect x="1265" y="1118" width="235" height="56" class="module-cyan"/>
  <text x="1382" y="1142" class="heading">MCP / 外部 API</text>
  <text x="1382" y="1164" class="small">stdio / SSE / HTTP transport</text>
  <rect x="1570" y="1118" width="235" height="56" class="module-cyan"/>
  <text x="1687" y="1142" class="heading">网络与对象存储</text>
  <text x="1687" y="1164" class="small">COS/MinIO/SMTP/集成</text>

  <!-- Connectors -->
  <path d="M1085 204 V269" class="arrow"/>
  <path d="M1050 321 V389" class="arrow"/>
  <path d="M1050 445 V502" class="arrow"/>
  <path d="M502 832 V900" class="arrow-soft"/>
  <path d="M915 832 V900" class="arrow-soft"/>
  <path d="M1340 832 V900" class="arrow-soft"/>
  <path d="M1685 832 V900" class="arrow-soft"/>
  <path d="M480 1045 V1118" class="arrow-soft"/>
  <path d="M745 1045 V1118" class="arrow-soft"/>
  <path d="M1010 1045 V1118" class="arrow-soft"/>
  <path d="M1275 1045 V1118" class="arrow-soft"/>
  <path d="M1540 1045 V1118" class="arrow-soft"/>
  <path d="M675 692 H720" class="arrow"/>
  <path d="M1110 692 H1155" class="arrow"/>
  <path d="M1525 692 H1560" class="arrow"/>
  <path d="M1608 602 C1510 525 1380 525 1340 602" class="arrow-soft"/>
  <path d="M1675 814 C1675 875 1540 875 1540 925" class="arrow-soft"/>

  <!-- Legend / source -->
  <rect x="90" y="1230" width="1620" height="34" fill="#ffffff" stroke="#cbd5e1" rx="8"/>
  <text x="110" y="1252" class="caption">生成依据：Agent_Server/src/main.py、api/routes、application/*、graph/nodes、registry/*、modes/*、runtime/*、infrastructure/*、agent_web/src/views/stores/services。</text>
</svg>
